<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal RAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --fg: #e6e6e6;
            --muted: #808080;
            --accent: #f5a623; /* Amber/Orange */
            --accent-glow: rgba(245, 166, 35, 0.08);
            --danger: #ff4a4a; /* Red for reset button */
            --danger-glow: rgba(255, 74, 74, 0.12);
            --border: #262626;
            --sans: 'Space Grotesk', sans-serif;
            --mono: 'Space Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--sans);
            font-size: 16px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle noise overlay for texture */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.75rem;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            color: var(--danger);
            border-color: var(--danger);
            background: var(--danger-glow);
            box-shadow: 0 0 12px var(--danger-glow);
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            padding-bottom: 2rem;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .role {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .user-message .role {
            color: var(--muted);
        }

        .content {
            font-size: 1.1rem;
            white-space: pre-wrap;
        }

        .metrics {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--muted);
            border-left: 2px solid var(--accent);
            background: var(--accent-glow);
            padding: 0.75rem 1rem;
            border-radius: 0 6px 6px 0;
            width: fit-content;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            gap: 2rem;
        }

        .metric-item span:first-child {
            color: var(--muted);
        }
        
        .metric-item span:last-child {
            color: var(--fg);
            text-align: right;
        }

        .input-wrapper {
            width: 100%;
            border-top: 1px solid var(--border);
            background: var(--bg);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: center;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-wrapper:focus-within {
            border-top-color: var(--accent);
            box-shadow: 0 -4px 20px var(--accent-glow);
        }

        form {
            width: 100%;
            max-width: 720px;
            display: flex;
            position: relative;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--fg);
            font-family: var(--sans);
            font-size: 1.1rem;
            padding: 0.5rem 4rem 0.5rem 0; /* Extra right padding so text doesn't overlap the button */
            outline: none;
            transition: border-bottom-color 0.3s;
        }

        input:focus {
            border-bottom-color: var(--accent);
        }

        input::placeholder {
            color: var(--muted);
        }

        .send-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: var(--mono);
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            opacity: 0.8;
            transition: opacity 0.2s, text-shadow 0.2s;
        }

        .send-btn:hover {
            opacity: 1;
            text-shadow: 0 0 8px var(--accent-glow);
        }

        .send-btn:disabled {
            color: var(--muted);
            cursor: not-allowed;
            text-shadow: none;
        }

        /* Loading indicator */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.1em;
            background-color: var(--accent);
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            margin-left: 4px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>System.RAG</h1>
        <button class="reset-btn" id="resetBtn">Reset Context</button>
    </header>

    <main id="mainArea">
        <div class="chat-container" id="chatContainer">
            <!-- Messages will be injected here -->
            <div class="message assistant-message">
                <div class="role">System</div>
                <div class="content">Type your query below.</div>
            </div>
        </div>
    </main>

    <div class="input-wrapper">
        <form id="chatForm">
            <input type="text" id="userInput" placeholder="Ask something..." autocomplete="off" required autofocus>
            <button type="submit" class="send-btn" id="sendBtn">Send</button>
        </form>
    </div>

    <script>
        // Generate a random session ID for this tab
        const sessionId = Math.random().toString(36).substring(2, 15);
        
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        const mainArea = document.getElementById('mainArea');
        const resetBtn = document.getElementById('resetBtn');

        function scrollToBottom() {
            mainArea.scrollTop = mainArea.scrollHeight;
        }

        function createMessageElement(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            
            const roleDiv = document.createElement('div');
            roleDiv.className = 'role';
            roleDiv.textContent = role === 'user' ? 'User' : 'Assistant';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            contentDiv.textContent = text;

            msgDiv.appendChild(roleDiv);
            msgDiv.appendChild(contentDiv);
            
            return { msgDiv, contentDiv };
        }

        function createMetricsElement(metricsData) {
            const metricsDiv = document.createElement('div');
            metricsDiv.className = 'metrics';
            
            const m = metricsData;
            
            // Replaced cryptic abbreviations with full readable context
            const items = [
                `<span>Context (ctx):</span> <span>${m.context_ms}ms</span>`,
                `<span>Retrieval (ret):</span> <span>${m.retrieval_ms}ms</span>`,
                `<span>Generation (llm):</span> <span>${m.llm_ms || '?'}ms</span>`,
                `<span>Total (tot):</span> <span>${m.total_ms || '?'}ms</span>`
            ];
            
            metricsDiv.innerHTML = items.map(item => `<div class="metric-item">${item}</div>`).join('');
            return metricsDiv;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            // 1. Add User Message
            const { msgDiv: userMsg } = createMessageElement('user', message);
            chatContainer.appendChild(userMsg);
            
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            scrollToBottom();

            // 2. Prepare Assistant Message container
            const { msgDiv: astMsg, contentDiv: astContent } = createMessageElement('assistant', '');
            
            // Add blinking cursor
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            astContent.appendChild(cursor);
            
            chatContainer.appendChild(astMsg);
            scrollToBottom();

            // 3. Connect to EventSource
            const url = '/chat/stream?session_id=' + encodeURIComponent(sessionId) + '&message=' + encodeURIComponent(message);
            const eventSource = new EventSource(url);

            let metadata = null;
            let fullText = '';

            eventSource.addEventListener('metadata', (e) => {
                metadata = JSON.parse(e.data);
            });

            eventSource.addEventListener('token', (e) => {
                const data = JSON.parse(e.data);
                fullText += data.text;
                astContent.textContent = fullText;
                astContent.appendChild(cursor); // Keep cursor at the end
                scrollToBottom();
            });

            eventSource.addEventListener('done', (e) => {
                const timingData = JSON.parse(e.data);
                eventSource.close();
                
                // Remove cursor
                if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
                
                // Add Metrics
                if (metadata) {
                    const finalMetrics = {
                        ...metadata,
                        llm_ms: timingData.llm_ms,
                        total_ms: timingData.total_ms
                    };
                    const metricsEl = createMetricsElement(finalMetrics);
                    astMsg.appendChild(metricsEl);
                }

                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                scrollToBottom();
            });

            eventSource.onerror = (err) => {
                console.error("EventSource failed:", err);
                eventSource.close();
                if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
                astContent.textContent += "\n[Connection Error]";
                userInput.disabled = false;
                sendBtn.disabled = false;
            };
        });

        resetBtn.addEventListener('click', async () => {
            try {
                await fetch('/session/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
                
                // Clear UI
                chatContainer.innerHTML = '<div class="message assistant-message"><div class="role">System</div><div class="content">Context reset. Ready for new query.</div></div>';
            } catch (err) {
                console.error("Reset failed", err);
            }
        });
    </script>
</body>
</html>
